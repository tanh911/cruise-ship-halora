[build]
  command = "git lfs install && git lfs pull && npm install && npm run build"
  publish = "dist"

[build.environment]
  GIT_LFS_ENABLED = "true"
  NODE_VERSION = "18"
  GIT_LFS_FETCH_INCLUDE = "*.glb"

[[headers]]
  for = "/models/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
